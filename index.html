<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Leitor Simples</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #eee;
  }

  #reader {
    width: 300px;
    margin: auto;
  }

  .box {
    background: white;
    padding: 10px;
    width: 300px;
    margin: 20px auto;
    border-radius: 10px;
  }

  .ok { color: green; }
  .erro { color: red; }
</style>
</head>
<body>

<h2>Câmera Leitor</h2>

<div id="reader"></div>

<div class="box">
  <p id="status">Aguardando...</p>
  <p>Nome: <span id="nome"></span></p>
  <p>ID: <span id="id"></span></p>
  <p>Motivo: <span id="motivo"></span></p>
</div>

<script>
function sucesso(codigo) {
  const status = document.getElementById("status");

  if (codigo === "29GC2791") {
    status.innerText = "Aluno confirmado ✅";
    status.className = "ok";

    document.getElementById("nome").innerText = "Gabriel Cruz Da Silva";
    document.getElementById("id").innerText = "29GC2791";
    document.getElementById("motivo").innerText = "Projeto Contra-Turno";

  } else {
    status.innerText = "Aluno não confirmado ❌";
    status.className = "erro";

    document.getElementById("nome").innerText = "";
    document.getElementById("id").innerText = "";
    document.getElementById("motivo").innerText = "";
  }
}

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras => {
  if (cameras.length) {
    scanner.start(
      cameras[0].id,
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        sucesso(decodedText);
      }
    );
  }
});
</script>

</body>
</html>
